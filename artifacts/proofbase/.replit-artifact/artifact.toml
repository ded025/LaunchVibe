kind = "web"
previewPath = "/"
title = "ProofBase"
version = "1.0.0"
id = "artifacts/proofbase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24332

[services.development]
run = "pnpm --filter @workspace/proofbase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proofbase", "run", "build" ]
publicDir = "artifacts/proofbase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24332"
BASE_PATH = "/"
